name: setup

# Integration check: render the android,java script and actually run it on a
# clean runner, then assert the installed environment works. This complements
# render.yml (which only syntax-checks the rendered output) by exercising the
# real Nix install, the persisted profile, and the JDK/Android tooling.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  android-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render android,java
        run: |
          node -e "process.stdout.write(require('./api/env/render').render('android,java').body)" > /tmp/android-java.sh
          bash -n /tmp/android-java.sh
          echo "rendered $(wc -l < /tmp/android-java.sh) lines"

      - name: Run the installer
        run: bash /tmp/android-java.sh

      - name: Verify the installed environment (fresh shell, persisted profile)
        run: |
          set -euo pipefail
          # A brand-new shell must be able to pick the environment back up from
          # the persisted profile alone — that is the whole contract of the
          # bootstrapper.
          source ~/.config/coo-ee/env.sh

          echo "== java =="
          java -version
          [ -n "${JAVA_HOME:-}" ] && [ -x "$JAVA_HOME/bin/java" ]

          echo "== android tools =="
          adb --version
          [ -n "${ANDROID_HOME:-}" ] && [ -d "$ANDROID_HOME" ]

          echo "== nix =="
          nix --version

          echo "OK: android,java environment is usable from a fresh shell"

      - name: Verify idempotency — second run short-circuits
        run: |
          set -euo pipefail
          # On a provisioned box the script must take the fast path and skip the
          # install entirely, not re-run it.
          out=$(bash /tmp/android-java.sh 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          echo "$out" | grep -qi "already provisioned" \
            || { echo "FAIL: second run did not short-circuit"; exit 1; }
          echo "OK: re-run short-circuited as already provisioned"

      - name: Verify COOEE_FORCE re-provisions (bypasses short-circuit)
        run: |
          set -euo pipefail
          out=$(COOEE_FORCE=1 bash /tmp/android-java.sh 2>&1) || { echo "$out"; exit 1; }
          echo "$out" | grep -qi "already provisioned" \
            && { echo "FAIL: COOEE_FORCE still short-circuited"; exit 1; }
          echo "OK: COOEE_FORCE forced a re-provision"
