name: devenv

# Integration check for the ?devenv provisioning backend
# (modules/_backend-devenv.sh + base.sh + java.sh). render.yml only
# syntax-checks the rendered script and the unit tests only cover the
# renderer/flag selection — neither actually runs devenv. This job renders a
# ?devenv script and executes it on a clean runner: it installs Nix, installs
# devenv on top, generates a devenv.nix, builds the environment, and must end
# up with the tools on PATH. It then asserts the devenv-specific behaviours the
# backend promises — answering the open "is it functional end-to-end?" concern:
#
#   * devenv itself is installed and drives provisioning (generated devenv.nix),
#   * three packages (go + a JDK + node) share one devenv profile and resolve
#     from it, not from a plain nix profile,
#   * the single-JDK collapse fires for a multi-version request (17,21 -> 17),
#   * the build-dependency prefetch runs (npm) against the devenv-provided node,
#   * a fresh shell picks the env up from the persisted profile, and
#   * a re-run short-circuits (idempotent).
#
# COOEE_FORCE=1 on the install run is deliberate: GitHub runners ship
# Go/JDKs/Node preinstalled, which the modules would otherwise adopt — skipping
# the devenv path entirely. Forcing the install is what exercises the backend.

# PRs run on pull_request; push is scoped to main so an open PR's commits
# don't trigger a second (duplicate) run.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  devenv-provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render go,java[17,21],node with the ?devenv backend
        run: |
          set -euo pipefail
          node -e "process.stdout.write(require('./api/env/render').render('go,java[17,21],node', { devenv: true }).body)" > /tmp/devenv.sh
          bash -n /tmp/devenv.sh
          grep -q 'BACKEND: devenv.sh' /tmp/devenv.sh \
            || { echo "FAIL: devenv backend fragment not spliced in"; exit 1; }
          # The whole point of the refactor: no runtime backend conditional leaks in.
          if grep -qE 'set_backend|cooee_devenv_enabled' /tmp/devenv.sh; then
            echo "FAIL: rendered script carries a runtime backend conditional"; exit 1
          fi
          echo "rendered $(wc -l < /tmp/devenv.sh) lines"

      - name: Seed an isolated project (package.json drives the npm prefetch)
        run: |
          set -euo pipefail
          mkdir -p /tmp/cooee-proj
          # left-pad@1.3.0 is tiny and dependency-free — enough to prove the
          # prefetch installs from the registry using the devenv-provided node.
          cat > /tmp/cooee-proj/package.json <<'JSON'
          {
            "name": "cooee-devenv-ci",
            "version": "1.0.0",
            "private": true,
            "dependencies": { "left-pad": "1.3.0" }
          }
          JSON

      - name: Run the installer (force install; prefetch ON to exercise npm under devenv)
        working-directory: /tmp/cooee-proj
        env:
          COOEE_FORCE: "1"
        run: |
          set -o pipefail
          bash /tmp/devenv.sh 2>&1 | tee /tmp/devenv.log

      - name: Assert the single-JDK collapse fired (17,21 -> 17)
        run: |
          set -euo pipefail
          grep -qi "devenv backend provisions a single JDK" /tmp/devenv.log \
            || { echo "FAIL: multi-version JDK collapse warning not emitted"; exit 1; }
          echo "OK: java[17,21] collapsed to a single JDK under devenv"

      - name: Assert devenv was installed and generated the config
        run: |
          set -euo pipefail
          source ~/.config/coo-ee/env.sh

          command -v devenv >/dev/null || { echo "FAIL: devenv not installed"; exit 1; }
          echo "devenv: $(devenv version 2>/dev/null || echo present)"

          dir="$HOME/.config/coo-ee/devenv"
          test -f "$dir/devenv.nix" || { echo "FAIL: generated devenv.nix missing"; exit 1; }
          echo "== generated devenv.nix =="; cat "$dir/devenv.nix"
          for pkg in pkgs.go pkgs.temurin-bin-17 pkgs.nodejs_22; do
            grep -q "$pkg" "$dir/devenv.nix" || { echo "FAIL: $pkg missing from devenv.nix"; exit 1; }
          done
          if grep -q 'pkgs.temurin-bin-21' "$dir/devenv.nix"; then
            echo "FAIL: temurin-bin-21 present — collapse did not drop the extra JDK"; exit 1
          fi
          echo "OK: devenv.nix lists go + node + a single JDK"

      - name: Verify go + java resolve from the devenv profile (fresh shell)
        run: |
          set -euo pipefail
          # A brand-new shell must pick the environment up from the persisted
          # profile alone — the whole contract of the bootstrapper.
          source ~/.config/coo-ee/env.sh
          profile_bin="$HOME/.config/coo-ee/devenv/.devenv/profile/bin"

          echo "== go =="
          go version
          go_path="$(command -v go)"
          case "$go_path" in
            "$profile_bin"/*) echo "OK: go served from the devenv profile ($go_path)";;
            *) echo "FAIL: go is $go_path, not the devenv profile $profile_bin"; exit 1;;
          esac

          echo "== java =="
          java -version
          [ -n "${JAVA_HOME:-}" ] && [ -x "$JAVA_HOME/bin/java" ] \
            || { echo "FAIL: JAVA_HOME unset or invalid"; exit 1; }
          echo "OK: go + java usable from a fresh shell, served by devenv"

      - name: Verify node resolves from devenv and the npm prefetch ran
        run: |
          set -euo pipefail
          source ~/.config/coo-ee/env.sh
          profile_bin="$HOME/.config/coo-ee/devenv/.devenv/profile/bin"

          echo "== node / npm =="
          node --version; npm --version
          for tool in node npm; do
            p="$(command -v "$tool")"
            case "$p" in
              "$profile_bin"/*) echo "OK: $tool served from the devenv profile ($p)";;
              *) echo "FAIL: $tool is $p, not the devenv profile $profile_bin"; exit 1;;
            esac
          done

          # The build-dependency prefetch ran npm against the devenv-provided
          # node, installing the project's dependency into node_modules.
          test -d /tmp/cooee-proj/node_modules/left-pad \
            || { echo "FAIL: npm prefetch did not install deps under devenv";
                 ls -A /tmp/cooee-proj/node_modules 2>/dev/null || true; exit 1; }
          grep -qi "npm dependencies installed" /tmp/devenv.log \
            || { echo "FAIL: prefetch did not report installing npm deps"; exit 1; }
          echo "OK: npm prefetch installed deps using the devenv-provided node"

      - name: Verify idempotency — second run short-circuits
        working-directory: /tmp/cooee-proj
        run: |
          set -euo pipefail
          out=$(bash /tmp/devenv.sh 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          echo "$out" | grep -qi "already provisioned" \
            || { echo "FAIL: second run did not short-circuit"; exit 1; }
          echo "OK: re-run short-circuited as already provisioned"

      - name: Upload the install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devenv-install-log
          path: /tmp/devenv.log
          retention-days: 7
