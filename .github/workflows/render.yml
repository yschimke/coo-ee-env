name: render
# PRs run on pull_request; branch pushes that have an open PR don't double-run
# because push is scoped to main (covers the post-merge commit).
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: render every module set and syntax-check the output
        run: |
          for m in base java android node python go rust \
                   java,android node,python,go,rust \
                   java,android,node,python,go,rust; do
            echo "== $m =="
            node -e "process.stdout.write(require('./api/env/render').render('$m').body)" | bash -n -
          done
