name: render
# PRs run on pull_request; branch pushes that have an open PR don't double-run
# because push is scoped to main (covers the post-merge commit).
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: unit tests (renderer, params, implications, recommendations)
        run: node --test
      - name: render every module set and syntax-check the output
        run: |
          # Array form so bracketed sets can be quoted (the shell mustn't glob `[...]`).
          sets=(base java android android-cli android-emulator node python go rust skills tools \
                java,android node,python,go,rust \
                java,android,node,python,go,rust \
                "java[17,21]" "java[17,21],android[30,37,wear-33]" \
                "android-emulator[34],java" \
                "skills[yschimke/skills]" \
                "skills[yschimke/skills,obra/superpowers],java,android" \
                "tools[ripgrep,jq,gh]" \
                "tools[ripgrep,jq],skills[yschimke/skills],node")
          # Each set is valid under both render-time backends (nix profile and
          # the ?devenv driver), so syntax-check the output of each.
          for m in "${sets[@]}"; do
            for opt in "" "{ devenv: true }"; do
              echo "== $m ${opt:+(devenv)} =="
              node -e "process.stdout.write(require('./api/env/render').render(process.argv[1], $([ -n "$opt" ] && echo "$opt" || echo undefined)).body)" "$m" | bash -n -
            done
          done
