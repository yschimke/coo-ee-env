name: render
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: render every module set and syntax-check the output
        run: |
          # Quote bracketed sets so the shell doesn't glob `[...]`.
          sets=(base java android java,android skills \
                "skills[yschimke/skills]" \
                "skills[yschimke/skills,obra/superpowers],java,android")
          for m in "${sets[@]}"; do
            echo "== $m =="
            node -e "process.stdout.write(require('./api/env/render').render(process.argv[1]).body)" "$m" | bash -n -
          done
